<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Asistencia Estudiantil</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
background:#f5f7fa;
}
.card{
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
#reader{
width:100%;
max-width:500px;
margin:auto;
}
.qrbox{
display:flex;
justify-content:center;
padding:15px;
}
</style>
</head>
<body>

<div class="container py-4">

<h2 class="text-center mb-4">
Sistema de Control de Asistencia
</h2>

<div class="mb-3">
<button class="btn btn-success" onclick="nuevoEstudiante()">
Nuevo Estudiante
</button>

<button class="btn btn-primary" onclick="exportarBackup()">
Exportar Backup
</button>

<input type="file" id="importFile" hidden onchange="importarBackup(event)">

<button class="btn btn-warning" onclick="document.getElementById('importFile').click()">
Importar Backup
</button>

<button class="btn btn-dark" onclick="abrirScanner()">
Escanear QR
</button>
</div>

<div class="card mb-4">
<div class="card-header">
Estudiantes
</div>

<div class="table-responsive">
<table class="table table-bordered table-hover">
<thead class="table-dark">
<tr>
<th>DNI</th>
<th>Nombres</th>
<th>Apellidos</th>
<th>Género</th>
<th>Edad</th>
<th>Teléfono</th>
<th>Acciones</th>
</tr>
</thead>
<tbody id="tablaEstudiantes"></tbody>
</table>
</div>
</div>

<div class="card mb-4">
<div class="card-header">
Registro de Asistencias
</div>

<div class="table-responsive">
<table class="table table-striped">
<thead>
<tr>
<th>Fecha</th>
<th>Hora</th>
<th>DNI</th>
<th>Estudiante</th>
<th>Acción</th>
</tr>
</thead>
<tbody id="tablaAsistencias"></tbody>
</table>
</div>
</div>

<div class="card">
<div class="card-header">
Lector QR
</div>

<div class="card-body">
<div id="reader"></div>
</div>
</div>

</div>

<script>

];

let asistencias =
JSON.parse(localStorage.getItem("asistencias")) || [];

function guardar(){
localStorage.setItem("estudiantes",JSON.stringify(estudiantes));
localStorage.setItem("asistencias",JSON.stringify(asistencias));
}

function render(){

let html='';

estudiantes.forEach((e,i)=>{

html+=`
<tr>
<td>${e.dni}</td>
<td>${e.nombres}</td>
<td>${e.apellidos}</td>
<td>${e.genero}</td>
<td>${e.edad}</td>
<td>${e.telefono}</td>
<td>

<button class="btn btn-sm btn-warning"
onclick="editar(${i})">✏️</button>

<button class="btn btn-sm btn-danger"
onclick="eliminar(${i})">🗑️</button>

<button class="btn btn-sm btn-info"
onclick="mostrarQR('${e.dni}')">QR</button>

</td>
</tr>`;
});

document.getElementById("tablaEstudiantes").innerHTML=html;

let asis='';

asistencias.forEach((a,i)=>{

asis+=`
<tr>
<td>${a.fecha}</td>
<td>${a.hora}</td>
<td>${a.dni}</td>
<td>${a.nombre}</td>
<td>
<button class="btn btn-danger btn-sm"
onclick="eliminarAsistencia(${i})">
Eliminar
</button>
</td>
</tr>`;
});

document.getElementById("tablaAsistencias").innerHTML=asis;

guardar();
}

function nuevoEstudiante(){

Swal.fire({
title:'Nuevo Estudiante',
html:`
<input id="dni" class="swal2-input" placeholder="DNI">
<input id="nom" class="swal2-input" placeholder="Nombres">
<input id="ape" class="swal2-input" placeholder="Apellidos">
<input id="gen" class="swal2-input" placeholder="Género">
<input id="edad" class="swal2-input" placeholder="Edad">
<input id="tel" class="swal2-input" placeholder="Teléfono">
`,
preConfirm:()=>{

estudiantes.push({
dni:dni.value,
nombres:nom.value,
apellidos:ape.value,
genero:gen.value,
edad:edad.value,
telefono:tel.value
});

render();
}
});
}

function editar(i){

let e=estudiantes[i];

Swal.fire({
title:'Editar',
html:`
<input id="dni" class="swal2-input" value="${e.dni}">
<input id="nom" class="swal2-input" value="${e.nombres}">
<input id="ape" class="swal2-input" value="${e.apellidos}">
<input id="gen" class="swal2-input" value="${e.genero}">
<input id="edad" class="swal2-input" value="${e.edad}">
<input id="tel" class="swal2-input" value="${e.telefono}">
`,
preConfirm:()=>{

estudiantes[i]={
dni:dni.value,
nombres:nom.value,
apellidos:ape.value,
genero:gen.value,
edad:edad.value,
telefono:tel.value
};

render();
}
});
}

function eliminar(i){
estudiantes.splice(i,1);
render();
}

function mostrarQR(dni){

Swal.fire({
title:'Código QR',
html:'<div id="qr"></div>',
didOpen:()=>{
new QRCode(document.getElementById("qr"),dni);
}
});
}

function registrarAsistencia(dni){

let alumno=
estudiantes.find(x=>x.dni===dni);

if(!alumno)return;

let ahora=new Date();

asistencias.push({

dni,
nombre:alumno.nombres+" "+alumno.apellidos,
fecha:ahora.toLocaleDateString(),
hora:ahora.toLocaleTimeString()

});

render();

Swal.fire(
'Asistencia registrada',
alumno.nombres,
'success'
);
}

function eliminarAsistencia(i){
asistencias.splice(i,1);
render();
}

function exportarBackup(){

const contenido=
`const backup=${JSON.stringify({
estudiantes,
asistencias
},null,2)};`;

const blob=
new Blob([contenido],{type:'text/javascript'});

const a=document.createElement('a');

a.href=URL.createObjectURL(blob);
a.download='backup.js';
a.click();
}

function importarBackup(e){

const archivo=e.target.files[0];

if(!archivo)return;

const lector=new FileReader();

lector.onload=function(ev){

try{

const texto=ev.target.result;

if(texto.includes("const backup=")){

eval(texto);

estudiantes=backup.estudiantes;
asistencias=backup.asistencias;

}else{

const data=JSON.parse(texto);

estudiantes=data.estudiantes;
asistencias=data.asistencias;
}

render();

Swal.fire(
'Importado',
'Datos restaurados',
'success'
);

}catch(err){

Swal.fire(
'Error',
'Archivo inválido',
'error'
);

}
}

lector.readAsText(archivo);
}

let scannerActivo=false;

function abrirScanner(){

if(scannerActivo)return;

const qrScanner=
new Html5Qrcode("reader");

qrScanner.start(
{ facingMode:"environment" },
{ fps:10, qrbox:250 },
(texto)=>{

registrarAsistencia(texto);

},
()=>{}
);

scannerActivo=true;
}

render();

</script>

</body>
</html>
